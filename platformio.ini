; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c6-devkitc-1]
platform = espressif32
board = esp32-c6-devkitc-1
framework = espidf
monitor_speed = 115200
monitor_echo = yes

; El manifest de la placa (DevKitC-1 oficial) declara 8MB de flash, pero el
; modulo real de este nodo tiene 2MB. Declararlo aca evita el warning de
; mismatch y evita depender de que el sdkconfig generado conserve el valor
; correcto ante un `pio run --target clean` o una regeneracion.
board_upload.flash_size = 2MB
